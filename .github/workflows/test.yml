name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv run --with "pytest>=8.0.0" --with "pytest-asyncio>=0.23.0" pytest tests/ -v
